<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>社員登録</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <!-- <h1>安否確認システム</h1> -->
    <h1>
      <a href="admin_menu.html" class="header-logo-link">安否確認システム</a>
      <!-- <a href="http://127.0.0.1:5500/employee_list.html" class="logout-link"> -->

    </h1>


    <button class="logout">ログアウト</button>
  </header>

  <div class="container">
    <h2>社員登録</h2>

    <form>

      <div class="form-row">

        <div class="form-group">
          <label>社員ID</label>
          <input type="text" placeholder="社員IDを入力">
        </div>

        <div class="form-group">
          <label>部署</label>
          <select>
            <option value="">部署を選択</option>
            <option value="IT">IT部</option>
            <option value="HR">HR部</option>
            <option value="総務">総務部</option>
          </select>
        </div>

        <div class="form-group">
          <label>名前</label>
          <input type="text" placeholder="名前を入力">
        </div>

        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" placeholder="メールアドレスを入力">
        </div>

      </div>

      <div class="form-btn">
        <button type="button" class="cancel">キャンセル</button>
        <button type="submit" class="submit">登録する</button>
      </div>

    </form>
  </div>

</body>

</html>
